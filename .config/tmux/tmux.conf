set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Keep new panes evenly sized after splitting.
bind '"' split-window -v \; select-layout even-vertical
bind % split-window -h \; select-layout even-horizontal


set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -s set-clipboard on
set -g mouse on
set -g mode-keys vi
set -g base-index 1
set -g renumber-windows on
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=blue bold"
set -g status-right ""
set -g status-left "#S"

bind r source-file "~/.config/tmux/tmux.conf" \; display-message "tmux config reloaded"
bind f run "tmux neww ~/.config/scripts/tmux-session-dispensary.sh"
bind N run "~/.config/scripts/tmux-session-dispensary.sh ~/notes"
bind P run "~/.config/scripts/tmux-session-dispensary.sh ~/projects"
bind D run "~/.config/scripts/tmux-session-dispensary.sh ~/.config"
bind H run "~/.config/scripts/tmux-session-dispensary.sh ~"
bind L run "~/.config/scripts/tmux-session-dispensary.sh ~/download"
