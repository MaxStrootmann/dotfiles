# Remote tmux profile for SSH/VPS sessions.
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -s set-clipboard on
set -g mouse on
set -g mode-keys vi
set -g history-limit 100000
set -g base-index 1
set -g renumber-windows on
set -g status-position top
set -g status-justify left
set -g status-style "bg=default"
set -g window-status-current-style "fg=blue,bold"
set -g status-left "#S"
set -g status-right ""

bind r source-file "~/.config/tmux/tmux.conf" \; display-message "tmux config reloaded"
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T root WheelUpPane if-shell -F "#{pane_in_mode}" "send-keys -M" "copy-mode -e"
bind -T copy-mode-vi WheelUpPane send -X scroll-up
bind -T copy-mode-vi WheelDownPane send -X scroll-down
